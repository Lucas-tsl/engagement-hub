name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  php:
    name: PHP (syntaxe + WordPress Coding Standards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Vérification de la syntaxe PHP
        run: find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 -I{} php -l {}

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ hashFiles('composer.json') }}

      - name: Installer les dépendances Composer
        run: composer install --no-progress --prefer-dist

      - name: WordPress Coding Standards (PHPCS)
        run: vendor/bin/phpcs

  js-css:
    name: JS & CSS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances npm
        run: npm install

      - name: ESLint
        run: npm run lint:js

      - name: Stylelint
        run: npm run lint:css

  build:
    name: Build du plugin (zip)
    needs: [php, js-css]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assembler le dossier du plugin (fichiers de dev exclus via .distignore)
        run: |
          mkdir -p build/engagement-hub
          rsync -a --exclude-from='.distignore' ./ build/engagement-hub/
          cd build && zip -r engagement-hub.zip engagement-hub

      - name: Uploader l'artefact de build
        uses: actions/upload-artifact@v4
        with:
          name: engagement-hub
          path: build/engagement-hub.zip

      - name: Attacher le zip à la Release GitHub
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/engagement-hub.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Staging : automatique à chaque merge sur main. Secrets à créer dans
  # Settings > Environments > staging (voir README, section Workflow).
  deploy-staging:
    name: Déploiement Staging (SFTP)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Télécharger l'artefact de build
        uses: actions/download-artifact@v4
        with:
          name: engagement-hub
          path: dist

      - name: Décompresser le zip
        run: unzip dist/engagement-hub.zip -d dist

      - name: Déployer vers le staging via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.STAGING_SFTP_USERNAME }}
          server: ${{ secrets.STAGING_SFTP_HOST }}
          password: ${{ secrets.STAGING_SFTP_PASSWORD }}
          port: 22
          local_path: './dist/engagement-hub/*'
          remote_path: ${{ secrets.STAGING_SFTP_REMOTE_PATH }}

  # Production : uniquement à la publication d'une Release GitHub (tag
  # vX.Y.Z), jamais automatique sur un simple push. Si l'environnement
  # "production" a des reviewers obligatoires configurés (recommandé, voir
  # README), ce job attend une validation manuelle avant de s'exécuter.
  deploy-production:
    name: Déploiement Production (SFTP)
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Télécharger l'artefact de build
        uses: actions/download-artifact@v4
        with:
          name: engagement-hub
          path: dist

      - name: Décompresser le zip
        run: unzip dist/engagement-hub.zip -d dist

      - name: Déployer vers la production via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.PRODUCTION_SFTP_USERNAME }}
          server: ${{ secrets.PRODUCTION_SFTP_HOST }}
          password: ${{ secrets.PRODUCTION_SFTP_PASSWORD }}
          port: 22
          local_path: './dist/engagement-hub/*'
          remote_path: ${{ secrets.PRODUCTION_SFTP_REMOTE_PATH }}
